<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <!-- Radial gradient for the dark sky background -->
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0f1524"/>
      <stop offset="100%" stop-color="#070a10"/>
    </radialGradient>
    <!-- Glow for defocused star donuts -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Subtle glow for the center wavefront rings -->
    <filter id="ringGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="0.8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="64" cy="64" r="62" fill="url(#bg)" stroke="#1a2040" stroke-width="1.5"/>

  <!-- SkyWave-style colored concentric wavefront rings (center) -->
  <circle cx="64" cy="64" r="22" fill="none" stroke="#ef4444" stroke-width="1.2" opacity="0.7" filter="url(#ringGlow)"/>
  <circle cx="64" cy="64" r="17" fill="none" stroke="#f59e0b" stroke-width="1.0" opacity="0.6" filter="url(#ringGlow)"/>
  <circle cx="64" cy="64" r="12" fill="none" stroke="#4ade80" stroke-width="1.0" opacity="0.6" filter="url(#ringGlow)"/>
  <circle cx="64" cy="64" r="7"  fill="none" stroke="#5b8def" stroke-width="1.2" opacity="0.8" filter="url(#ringGlow)"/>
  <!-- Center dot -->
  <circle cx="64" cy="64" r="2.5" fill="#5b8def" opacity="0.9"/>

  <!-- Dotted orbit ring showing the circular capture path -->
  <circle cx="64" cy="64" r="44" fill="none" stroke="#5b8def" stroke-width="0.6" stroke-dasharray="3,4" opacity="0.3"/>

  <!-- 8 defocused star donuts around the circle (ring positions) -->
  <!-- Position 1: top -->
  <circle cx="64" cy="20" r="6" fill="none" stroke="#5b8def" stroke-width="1.8" opacity="0.7" filter="url(#glow)"/>
  <circle cx="64" cy="20" r="2" fill="#070a10" stroke="#5b8def" stroke-width="0.5" opacity="0.5"/>

  <!-- Position 2: top-right -->
  <circle cx="95" cy="33" r="6" fill="none" stroke="#5b8def" stroke-width="1.8" opacity="0.7" filter="url(#glow)"/>
  <circle cx="95" cy="33" r="2" fill="#070a10" stroke="#5b8def" stroke-width="0.5" opacity="0.5"/>

  <!-- Position 3: right -->
  <circle cx="108" cy="64" r="6" fill="none" stroke="#5b8def" stroke-width="1.8" opacity="0.7" filter="url(#glow)"/>
  <circle cx="108" cy="64" r="2" fill="#070a10" stroke="#5b8def" stroke-width="0.5" opacity="0.5"/>

  <!-- Position 4: bottom-right -->
  <circle cx="95" cy="95" r="6" fill="none" stroke="#5b8def" stroke-width="1.8" opacity="0.7" filter="url(#glow)"/>
  <circle cx="95" cy="95" r="2" fill="#070a10" stroke="#5b8def" stroke-width="0.5" opacity="0.5"/>

  <!-- Position 5: bottom -->
  <circle cx="64" cy="108" r="6" fill="none" stroke="#5b8def" stroke-width="1.8" opacity="0.7" filter="url(#glow)"/>
  <circle cx="64" cy="108" r="2" fill="#070a10" stroke="#5b8def" stroke-width="0.5" opacity="0.5"/>

  <!-- Position 6: bottom-left -->
  <circle cx="33" cy="95" r="6" fill="none" stroke="#5b8def" stroke-width="1.8" opacity="0.7" filter="url(#glow)"/>
  <circle cx="33" cy="95" r="2" fill="#070a10" stroke="#5b8def" stroke-width="0.5" opacity="0.5"/>

  <!-- Position 7: left -->
  <circle cx="20" cy="64" r="6" fill="none" stroke="#5b8def" stroke-width="1.8" opacity="0.7" filter="url(#glow)"/>
  <circle cx="20" cy="64" r="2" fill="#070a10" stroke="#5b8def" stroke-width="0.5" opacity="0.5"/>

  <!-- Position 8: top-left -->
  <circle cx="33" cy="33" r="6" fill="none" stroke="#5b8def" stroke-width="1.8" opacity="0.7" filter="url(#glow)"/>
  <circle cx="33" cy="33" r="2" fill="#070a10" stroke="#5b8def" stroke-width="0.5" opacity="0.5"/>
</svg>
