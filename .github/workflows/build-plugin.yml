name: Build NINA Plugin

on:
  push:
    paths:
      - 'plugin/**'
    branches: ["main"]
  pull_request:
    paths:
      - 'plugin/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: plugin

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore NINA.AstroCircular.SkyWaver.sln

      - name: Build Release
        run: dotnet build NINA.AstroCircular.SkyWaver.sln --configuration Release --no-restore -p:Platform=x64

      - name: Package installer zip
        shell: pwsh
        run: |
          $stagingDir = "staging/AstroCircular.SkyWaver"
          New-Item -ItemType Directory -Force -Path $stagingDir
          Copy-Item "NINA.AstroCircular.SkyWaver/bin/x64/Release/NINA.AstroCircular.SkyWaver.dll" $stagingDir
          Copy-Item "install.bat" $stagingDir/../
          Copy-Item "uninstall.bat" $stagingDir/../
          # Include a README in the zip
          @"
          AstroCircular SkyWaver for N.I.N.A. — v0.1.0
          ==============================================

          INSTALL:  Double-click install.bat (closes NINA first!)
          MANUAL:   Copy the AstroCircular.SkyWaver folder to
                    %localappdata%\NINA\3\Plugins\

          UNINSTALL: Double-click uninstall.bat

          After installing, restart N.I.N.A. and find the plugin
          in Options > Plugins and the sequence instructions
          under the "AstroCircular SKW" category.

          https://github.com/joergs-git/astrocircular-skywaver-for-nina
          "@ | Out-File -Encoding utf8 "staging/README.txt"
          Compress-Archive -Path "staging/*" -DestinationPath "AstroCircular.SkyWaver-v0.1.0.zip" -Force

      - name: Upload installer zip
        uses: actions/upload-artifact@v4
        with:
          name: AstroCircular.SkyWaver-v0.1.0
          path: plugin/AstroCircular.SkyWaver-v0.1.0.zip
          if-no-files-found: error
